<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="100%" height="100%">
    <rect width="800" height="40" fill="#0a0a14"/>
    <text x="20" y="25" font-family="Courier New, monospace" font-size="14" fill="#666">
        SYS.READY : TRUE | LAST BUILD : JUST NOW
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </text>
    <!-- Blinking dot -->
    <circle cx="780" cy="20" r="5" fill="#00ffcc">
        <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
    </circle>
</svg>