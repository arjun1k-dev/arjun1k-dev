<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0ff" stop-opacity="0.15"/>
            <stop offset="50%" stop-color="#0ff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#0ff" stop-opacity="0.15"/>
        </linearGradient>
    </defs>

    <!-- Dark synthwave background -->
    <rect width="800" height="250" fill="#0a0a14"/>
    <!-- Moving scanlines -->
    <rect width="800" height="250" fill="url(#scanline)">
        <animate attributeName="y" values="0;250;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating synthwave grid -->
    <g opacity="0.1">
        <line x1="0" y1="80" x2="800" y2="80" stroke="#ff00ff" stroke-width="1">
            <animate attributeName="x1" values="0;800;0" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="160" x2="800" y2="160" stroke="#00ffff" stroke-width="1">
            <animate attributeName="x2" values="800;0;800" dur="8s" repeatCount="indefinite"/>
        </line>
    </g>

    <!-- Orbiting neon orbs -->
    <circle cx="100" cy="50" r="20" fill="#ff00ff" opacity="0.6" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0 400 125" to="360 400 125" dur="20s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="100;140;100;60;100" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="50;80;50;20;50" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="200" r="25" fill="#00ffff" opacity="0.5" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="360 400 125" to="0 400 125" dur="15s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="700;660;700;740;700" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="200;170;200;230;200" dur="7s" repeatCount="indefinite"/>
    </circle>

    <!-- Glitch title: three overlapping text layers with flickering -->
    <g font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" text-anchor="middle">
        <!-- Shadow/glitch layer 1 (cyan) -->
        <text x="402" y="120" font-size="60" fill="#00ffff" opacity="0.7" filter="url(#glow)">
            ARJUN1K-DEV
            <animate attributeName="opacity" values="0.7;0.2;0.7;0.1;0.7" dur="0.15s" repeatCount="indefinite"/>
        </text>
        <!-- Shadow/glitch layer 2 (magenta) -->
        <text x="398" y="122" font-size="60" fill="#ff00ff" opacity="0.7" filter="url(#glow)">
            ARJUN1K-DEV
            <animate attributeName="opacity" values="0.7;0.5;0.7;0.8;0.7" dur="0.2s" repeatCount="indefinite"/>
        </text>
        <!-- Main solid white text -->
        <text x="400" y="120" font-size="60" fill="#ffffff">
            ARJUN1K-DEV
        </text>
    </g>

    <!-- Subtitle with typing reveal -->
    <text x="400" y="180" font-family="'Courier New', monospace" font-size="20" fill="#00ffff" text-anchor="middle" filter="url(#glow)">
        BUILDING SYNAPTIC SYSTEMS
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </text>

    <!-- Blinking cursor -->
    <text x="400" y="180" font-family="'Courier New', monospace" font-size="20" fill="#ffffff" text-anchor="middle">
        _
        <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.3;0.31;0.6;0.61;1" dur="1s" repeatCount="indefinite"/>
    </text>
</svg>