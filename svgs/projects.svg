<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
    <defs>
        <filter id="glowCyan">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowMagenta">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="800" height="200" fill="#0a0a14"/>

    <!-- Scanlines -->
    <g opacity="0.1">
        <line x1="0" y1="50" x2="800" y2="50" stroke="#00ffff" stroke-width="1">
            <animate attributeName="y1" values="0;200;0" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="0;200;0" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="100" x2="800" y2="100" stroke="#ff00ff" stroke-width="1">
            <animate attributeName="y1" values="0;200;0" dur="6s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="0;200;0" dur="6s" repeatCount="indefinite"/>
        </line>
    </g>

    <!-- Particles -->
    <circle cx="80" cy="40" r="4" fill="#00ffff" filter="url(#glowCyan)">
        <animate attributeName="cx" values="80;130;80;30;80" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="40;90;40;20;40" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="160" r="3" fill="#ff00ff" filter="url(#glowMagenta)">
        <animate attributeName="cx" values="720;680;720;760;720" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="160;110;160;80;160" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- Glitch layer (magenta) -->
    <text x="400" y="110" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="90" font-weight="900" fill="#ff00ff" opacity="0.6" filter="url(#glowMagenta)">
        PROJECTS
        <animate attributeName="opacity" values="0.6;0.2;0.6;0.3;0.6" dur="0.2s" repeatCount="indefinite"/>
    </text>

    <!-- Main glow layer (cyan) -->
    <text x="400" y="110" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="90" font-weight="900" fill="#00ffff" filter="url(#glowCyan)">
        PROJECTS
        <animate attributeName="opacity" values="1;0.8;1;0.9;1" dur="0.15s" repeatCount="indefinite"/>
    </text>

    <!-- Sharp white core -->
    <text x="400" y="110" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="90" font-weight="900" fill="#ffffff">
        PROJECTS
        <animate attributeName="opacity" values="1;0.95;1;0.9;1" dur="0.08s" repeatCount="indefinite"/>
    </text>

    <!-- Corner marker pulse -->
    <circle cx="770" cy="30" r="5" fill="#ff00ff">
        <animate attributeName="r" values="5;9;5" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
</svg>