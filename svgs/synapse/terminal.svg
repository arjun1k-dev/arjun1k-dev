<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#0a0a14"/>
  <!-- Terminal window -->
  <rect x="20" y="15" width="760" height="250" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="20" y="15" width="760" height="26" fill="#16162a" stroke="#2a2a4a" stroke-width="1"/>
  <circle cx="40" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="58" cy="28" r="5" fill="#febc2e"/>
  <circle cx="76" cy="28" r="5" fill="#28c840"/>
  <text x="400" y="32" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#888888">terminal — synapse-quick-start.sh</text>
  <!-- Command lines -->
  <text x="40" y="68" font-family="'Courier New', monospace" font-size="12" fill="#4dffff" opacity="0">$ git clone https://github.com/arjun1k-dev/synapse-pkm.git<animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.5s"/></text>
  <text x="40" y="95" font-family="'Courier New', monospace" font-size="12" fill="#4dffff" opacity="0">$ cd synapse-pkm<animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.5s"/></text>
  <text x="40" y="122" font-family="'Courier New', monospace" font-size="12" fill="#4dffff" opacity="0">$ cp .env.example .env<animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.5s"/></text>
  <text x="40" y="149" font-family="'Courier New', monospace" font-size="12" fill="#28c840" opacity="0">$ docker-compose up --build<animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="3.5s"/></text>
  <text x="40" y="176" font-family="'Courier New', monospace" font-size="11" fill="#666666" opacity="0">... containers healthy ✓ ... backend on :8000 ... frontend on :3000<animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="5s"/></text>
  <text x="40" y="203" font-family="'Courier New', monospace" font-size="12" fill="#ffdf00" opacity="0">$ firefox http://localhost:3000<animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="6.5s"/></text>
  <!-- Blinking cursor -->
  <rect x="40" y="220" width="8" height="16" fill="#00ffff" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="7.5s"/>
  </rect>
</svg>