<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
    <defs>
        <filter id="glowCyan">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glowMagenta">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="800" height="300" fill="#0a0a14"/>

    <!-- Scanlines -->
    <g opacity="0.08">
        <line x1="0" y1="50" x2="800" y2="50" stroke="#00ffff" stroke-width="1">
            <animate attributeName="y1" values="0;300;0" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="0;300;0" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="120" x2="800" y2="120" stroke="#ff00ff" stroke-width="1">
            <animate attributeName="y1" values="0;300;0" dur="6s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="0;300;0" dur="6s" repeatCount="indefinite"/>
        </line>
    </g>

    <!-- Particles -->
    <circle cx="100" cy="50" r="3" fill="#00ffff" opacity="0.6" filter="url(#glowCyan)">
        <animate attributeName="cx" values="100;150;100;50;100" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="50;100;50;20;50" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="3" fill="#ff00ff" opacity="0.5" filter="url(#glowMagenta)">
        <animate attributeName="cx" values="700;650;700;750;700" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="250;200;250;180;250" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- ===== LINE 1: यत्र योगेश्वरः कृष्णो यत्र पार्थो धनुर्धरः ===== -->
    <!-- Glitch layer (magenta) -->
    <text x="400" y="115" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="46" font-weight="bold" fill="#ff00ff" opacity="0.6" filter="url(#glowMagenta)">
        यत्र योगेश्वरः कृष्णो यत्र पार्थो धनुर्धरः
        <animate attributeName="opacity" values="0.6;0.2;0.6;0.3;0.6" dur="0.2s" repeatCount="indefinite"/>
    </text>
    <!-- Main glow (cyan) -->
    <text x="400" y="115" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="46" font-weight="bold" fill="#00ffff" filter="url(#glowCyan)">
        यत्र योगेश्वरः कृष्णो यत्र पार्थो धनुर्धरः
        <animate attributeName="opacity" values="1;0.8;1;0.9;1" dur="0.15s" repeatCount="indefinite"/>
    </text>
    <!-- Sharp white -->
    <text x="400" y="115" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="46" font-weight="bold" fill="#ffffff">
        यत्र योगेश्वरः कृष्णो यत्र पार्थो धनुर्धरः
        <animate attributeName="opacity" values="1;0.95;1;0.9;1" dur="0.08s" repeatCount="indefinite"/>
    </text>

    <!-- ===== LINE 2: तत्र श्रीर्विजयो भूतिर्ध्रुवा नीतिर्मतिर्मम ===== -->
    <!-- Glitch layer (magenta) -->
    <text x="400" y="190" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="40" font-weight="bold" fill="#ff00ff" opacity="0.6" filter="url(#glowMagenta)">
        तत्र श्रीर्विजयो भूतिर्ध्रुवा नीतिर्मतिर्मम
        <animate attributeName="opacity" values="0.6;0.2;0.6;0.3;0.6" dur="0.2s" repeatCount="indefinite"/>
    </text>
    <!-- Main glow (cyan) -->
    <text x="400" y="190" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="40" font-weight="bold" fill="#00ffff" filter="url(#glowCyan)">
        तत्र श्रीर्विजयो भूतिर्ध्रुवा नीतिर्मतिर्मम
        <animate attributeName="opacity" values="1;0.8;1;0.9;1" dur="0.15s" repeatCount="indefinite"/>
    </text>
    <!-- Sharp white -->
    <text x="400" y="190" text-anchor="middle"
          font-family="'Nirmala UI', Mangal, 'Noto Sans Devanagari', 'Devanagari Sangam MN', sans-serif"
          font-size="40" font-weight="bold" fill="#ffffff">
        तत्र श्रीर्विजयो भूतिर्ध्रुवा नीतिर्मतिर्मम
        <animate attributeName="opacity" values="1;0.95;1;0.9;1" dur="0.08s" repeatCount="indefinite"/>
    </text>
</svg>