<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
    <rect width="800" height="200" fill="#0d0d0d"/>
    <rect x="10" y="10" width="780" height="180" fill="#111" stroke="#333" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="10" y="10" width="780" height="20" fill="#2a2a2a"/>
    <text x="20" y="24" font-family="Courier New, monospace" font-size="12" fill="#aaa">Terminal — synapse-quick-start.sh</text>

    <!-- Command lines revealed with staggered opacity -->
    <g font-family="Courier New, monospace" font-size="14" fill="#00ffcc">
        <!-- Line 1 -->
        <text x="20" y="55" opacity="0">$ git clone https://github.com/SkyArjun99/synapse.git
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
        </text>
        <!-- Line 2 -->
        <text x="20" y="75" opacity="0">$ cd synapse
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
        </text>
        <!-- Line 3 -->
        <text x="20" y="95" opacity="0">$ docker-compose up --build
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
        </text>
        <!-- Line 4 (appears after build) -->
        <text x="20" y="115" opacity="0">... containers healthy : backend :8000, frontend :3000
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4s" fill="freeze"/>
        </text>
        <!-- Line 5 -->
        <text x="20" y="135" opacity="0">$ firefox http://localhost:3000
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.5s" fill="freeze"/>
        </text>
    </g>

    <!-- Blinking cursor at end -->
    <text x="310" y="135" font-family="Courier New, monospace" font-size="14" fill="#00ffcc" opacity="0">
        _
        <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="5.5s" repeatCount="indefinite"/>
    </text>
</svg>