<svg width="100%" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg { fill: #e0e0e0; }

            /* Brutalist Shape Styles */
            .hard-shadow { fill: #000000; }
            .card-main { fill: #ffdf00; stroke: #000000; stroke-width: 4; }
            .tag-pink { fill: #ff90e8; stroke: #000000; stroke-width: 3; }
            .tag-cyan { fill: #4dffff; stroke: #000000; stroke-width: 3; }

            /* Typography */
            .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 36px; font-weight: 900; fill: #000000; }
            .mono-text { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #000000; }

            /* Harsh Animation */
            @keyframes rigid-bounce {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-4px, -4px); }
            }
            .brutal-animate { animation: rigid-bounce 1s steps(2, end) infinite; }
        </style>
    </defs>

    <rect width="800" height="250" class="bg" />

    <g transform="translate(50, 40)" class="brutal-animate">
        <rect x="8" y="8" width="700" height="150" class="hard-shadow" />

        <rect x="0" y="0" width="700" height="150" class="card-main" />

        <text x="30" y="60" class="title">SYNAPSE_PKM</text>
        <text x="30" y="95" class="mono-text">MEMORY_SAFE_RENDERING_ENGINE</text>

        <rect x="30" y="115" width="80" height="24" class="tag-pink" />
        <text x="70" y="133" text-anchor="middle" class="mono-text" font-size="14">NEXT.JS</text>

        <rect x="125" y="115" width="80" height="24" class="tag-cyan" />
        <text x="165" y="133" text-anchor="middle" class="mono-text" font-size="14">TS</text>
    </g>
</svg>
